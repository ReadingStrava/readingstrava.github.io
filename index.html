<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Reading Strava">
  <meta name="description" content="A simple reading recorder with a story-ready share card.">
  <title>Reading Strava</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="landingApp" class="landing-app">
    <section class="landing-shell">
      <p class="landing-shell__eyebrow">Reading Strava</p>
      <h1 class="landing-shell__title">Reading Tracker</h1>
      <p class="landing-shell__copy">A simple timer for reading sessions.</p>
      <div class="landing-shell__actions">
        <button id="installButton" class="button button--primary" type="button">Install App</button>
        <button id="openRecorderButton" class="button button--secondary" type="button">Open Recorder</button>
      </div>
      <p id="installStatus" class="landing-shell__status" aria-live="polite"></p>
    </section>
  </main>

  <main id="recorderApp" class="recorder-app" hidden>
    <section class="screen" data-screen="setup">
      <div class="screen__content">
        <p class="screen__eyebrow">Reading Tracker</p>
        <h1 class="screen__title">Track your reading sessions</h1>
        <label class="field">
          <span class="field__label">Starting Page</span>
          <input id="startPageInput" class="field__input field__input--large" type="number" min="1" inputmode="numeric" placeholder="0">
        </label>
        <button id="startButton" class="button button--primary" type="button">Start Reading</button>
        <button id="backButton" class="link-button" type="button">Back</button>
        <p id="setupStatus" class="screen__status" aria-live="polite"></p>
      </div>
    </section>

    <section class="screen" data-screen="running" hidden>
      <div class="screen__content screen__content--timer">
        <p class="timer-state">Reading</p>
        <div id="runningTimerValue" class="timer-value">00:00</div>
        <button id="pauseButton" class="pause-button" type="button" aria-label="Pause reading">
          <span class="pause-button__bars" aria-hidden="true"></span>
        </button>
      </div>
    </section>

    <section class="screen" data-screen="paused" hidden>
      <div class="screen__content screen__content--paused">
        <p class="timer-state timer-state--accent">Paused</p>
        <div id="pausedTimerValue" class="timer-value">00:00</div>
        <div class="stack-actions">
          <button id="continueButton" class="button button--primary" type="button">Continue</button>
          <button id="saveButton" class="button button--secondary" type="button">Save</button>
        </div>
        <button id="discardButton" class="link-button" type="button">Discard</button>
      </div>
    </section>

    <section class="screen" data-screen="save" hidden>
      <div class="screen__content">
        <h1 class="screen__title">Where did you stop?</h1>
        <p id="saveHint" class="screen__subtext">Started on page 0</p>
        <label class="field">
          <span class="field__label">Ending Page</span>
          <input id="endPageInput" class="field__input field__input--large field__input--outline" type="number" min="1" inputmode="numeric" placeholder="0">
        </label>
        <button id="saveSessionButton" class="button button--primary" type="button">Save Session</button>
        <button id="saveBackButton" class="link-button" type="button">Back</button>
        <p id="saveStatus" class="screen__status" aria-live="polite"></p>
      </div>
    </section>

    <section class="screen" data-screen="result" hidden>
      <div class="screen__content screen__content--result">
        <article class="result-stat">
          <p class="result-stat__label">Page(s)</p>
          <strong id="resultPages" class="result-stat__value result-stat__value--pages">0</strong>
        </article>
        <article class="result-stat">
          <p class="result-stat__label">Pace</p>
          <div class="result-stat__row">
            <strong id="resultPace" class="result-stat__value result-stat__value--pace">00:00</strong>
            <span class="result-stat__suffix">/p</span>
          </div>
        </article>
        <article class="result-stat">
          <p class="result-stat__label">Time</p>
          <strong id="resultTime" class="result-stat__value result-stat__value--time">00:00</strong>
        </article>
        <div class="result-icon" aria-hidden="true">
          <svg id="resultBookMark" class="result-icon__book" viewBox="0 0 208 168" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <button id="copyImageButton" class="button button--primary" type="button">Copy Image</button>
        <button id="newSessionButton" class="link-button" type="button">New Session</button>
      </div>
      <canvas id="storyCanvas" class="story-canvas" width="1080" height="1920" aria-hidden="true"></canvas>
    </section>
  </main>

  <noscript>
    <p class="noscript-banner">Reading Strava works best with JavaScript enabled.</p>
  </noscript>
  <script src="app.js"></script>
</body>
</html>
